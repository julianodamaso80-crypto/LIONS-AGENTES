version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # Different port to avoid conflict with Smith's Redis

  api:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  worker:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A app.celery_app worker -Q docling -c 2 --loglevel=info
