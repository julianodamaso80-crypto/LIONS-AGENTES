version: '3.8'

services:
  # MinIO - Object Storage para PDFs, DOCXs, TXTs
  minio:
    image: minio/minio:latest
    container_name: agent-scale-ai-minio
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - agent-scale-ai-network

  # Qdrant - Vector Database para embeddings
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: agent-scale-ai-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC (opcional)
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agent-scale-ai-network

  # Redis - Message Buffer para WhatsApp
  redis:
    image: redis:7-alpine
    container_name: agent-scale-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-scale-ai-network

volumes:
  minio_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local

networks:
  agent-scale-ai-network:
    driver: bridge
